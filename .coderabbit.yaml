# CodeRabbit AI 리뷰 설정 — https://docs.coderabbit.ai
# GitHub Marketplace에서 CodeRabbit 앱을 레포에 설치해야 동작 (public 레포 무료).
language: ko-KR
early_access: false
reviews:
  profile: chill # 과하지 않게
  request_changes_workflow: false # 변경요청 강제 X (리뷰는 요약/제안 위주)
  high_level_summary: true # PR 상단 요약
  review_status: true
  poem: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
chat:
  auto_reply: true
